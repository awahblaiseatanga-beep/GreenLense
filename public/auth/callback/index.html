<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Google Sign In Callback</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #090d16;
        color: #ffffff;
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
        margin: 0;
        text-align: center;
      }
      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid #10b981;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div>
      <div class="spinner"></div>
      <h3>Authenticating, please wait...</h3>
      <p>We are verifying your Google Ranger identity token.</p>
    </div>
    <script>
      // Supabase OAuth returns access_token / refresh_token in URL Hash, or auth code in query rules
      const hash = window.location.hash || window.location.search;
      if (window.opener) {
        window.opener.postMessage({ type: 'OAUTH_AUTH_SUCCESS', hash: hash }, '*');
        window.close();
      } else {
        // Fallback for non-popup redirects
        window.location.href = '/' + hash;
      }
    </script>
  </body>
</html>
